<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动化搜梗+生文工具</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold text-gray-800">自动化搜梗+生文工具</h1>
      <p class="text-gray-500 text-sm mt-1">基于 Node.js + Playwright + SQLite3</p>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
          作品/CP 管理
        </h2>
        
        <div class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <input
              type="text"
              id="workName"
              placeholder="作品名称"
              class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
            <input
              type="text"
              id="cpName"
              placeholder="CP名称"
              class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
            <button
              onclick="addWorkCp()"
              class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors"
            >
              添加作品/CP
            </button>
          </div>
        </div>

        <div class="mt-6">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-bold text-gray-600">作品/CP 列表</h3>
            <button
              onclick="window.open('/work-cp-list.html', '_blank')"
              class="text-sm text-blue-500 hover:text-blue-700 font-medium"
            >
              更多 →
            </button>
          </div>
          <div id="workCpList" class="space-y-2 max-h-64 overflow-y-auto">
            <div class="text-center text-gray-400 py-8">
              暂无数据
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
          文章生成
        </h2>
        
        <div class="space-y-4">
          <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-4">
            <div class="grid grid-cols-2 gap-4 text-center">
              <div>
                <h4 class="text-sm font-medium text-gray-600 mb-2">本地数据库 (SQLite)</h4>
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <div class="text-2xl font-bold text-blue-600" id="workCpCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">作品/CP</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-green-600" id="gengCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">梗内容</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-purple-600" id="articleCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">文章</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-orange-600">SQLite</div>
                    <div class="text-xs text-gray-500 mt-1">数据库</div>
                  </div>
                </div>
              </div>
              <div>
                <h4 class="text-sm font-medium text-gray-600 mb-2">云端数据库 (MySQL)</h4>
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <div class="text-2xl font-bold text-blue-600" id="mysqlWorkCpCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">作品/CP</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-green-600" id="mysqlGengCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">梗内容</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-purple-600" id="mysqlArticleCount">0</div>
                    <div class="text-xs text-gray-500 mt-1">文章</div>
                  </div>
                  <div>
                    <div class="text-2xl font-bold text-orange-600">MySQL</div>
                    <div class="text-xs text-gray-500 mt-1">数据库</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- 数据库切换按钮（暂时注释）
          <div class="flex gap-2">
            <button 
              onclick="switchDatabase('sqlite')"
              id="btnSqlite"
              class="flex-1 py-2 px-4 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-600 font-medium hover:bg-blue-100 transition-colors"
            >
              SQLite
            </button>
            <button 
              onclick="switchDatabase('mysql')"
              id="btnMysql"
              class="flex-1 py-2 px-4 rounded-lg border-2 border-orange-500 bg-orange-50 text-orange-600 font-medium hover:bg-orange-100 transition-colors"
            >
              MySQL
            </button>
          </div>
          -->

          <div class="flex gap-2 mt-4">
            <button 
              onclick="syncFromMysql()"
              class="flex-1 bg-purple-100 hover:bg-purple-200 text-purple-700 font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
              从云端同步
            </button>
            <button 
              onclick="syncToMysql()"
              class="flex-1 bg-green-100 hover:bg-green-200 text-green-700 font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l3-3m-3 3l-3-3m-2-8h12a2 2 0 012 2v5.586a1 1 0 01-.293.707l-5.414 5.414a1 1 0 01-.707.293H7a2 2 0 01-2-2V5a2 2 0 012-2z"></path>
              </svg>
              同步到云端
            </button>
          </div>

          <div class="flex gap-2">
            <button
              onclick="window.open('/geng-list.html', '_blank')"
              class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors"
            >
              梗内容列表
            </button>
            <button
              onclick="window.open('/article-list.html', '_blank')"
              class="flex-1 bg-orange-100 hover:bg-orange-200 text-orange-700 font-medium py-2 px-4 rounded-lg transition-colors"
            >
              文章列表
            </button>
          </div>
        </div>

        <div class="mt-4 p-3 bg-gray-50 rounded-lg">
          <div class="flex items-center gap-2">
            <div id="statusIndicator" class="w-3 h-3 bg-gray-300 rounded-full"></div>
            <span id="statusText" class="text-sm text-gray-500">就绪</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
      <div class="bg-white rounded-xl shadow-md p-6 h-full border border-gray-100">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-gray-800 flex items-center">
            <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
            梗内容列表
          </h2>
          <button 
            onclick="generateArticles()"
            id="generateBtn"
            class="bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white font-medium py-2 px-4 rounded-lg transition-all flex items-center gap-2 text-sm"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            开始生成文章
          </button>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <select
            id="gengWorkCpFilter"
            onchange="filterGengContent()"
            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
          >
            <option value="">所有作品/CP</option>
          </select>
          <select
            id="gengStatusFilter"
            onchange="filterGengContent()"
            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
          >
            <option value="">所有状态</option>
            <option value="pending" selected>待生成</option>
            <option value="completed">已完成</option>
          </select>
        </div>
        
        <div id="gengContentList" class="space-y-3">
          <div class="text-center text-gray-400 py-8">
            暂无数据
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-md p-6 h-full border border-gray-100">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <span class="w-2 h-2 bg-pink-500 rounded-full mr-2"></span>
          文章列表
        </h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <select
            id="articleWorkCpFilter"
            onchange="filterArticleContent()"
            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition"
          >
            <option value="">所有作品/CP</option>
          </select>
          <select
            id="articleStatusFilter"
            onchange="filterArticleContent()"
            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition"
          >
            <option value="">所有状态</option>
            <option value="published">已发布</option>
            <option value="unpublished" selected>未发布</option>
          </select>
        </div>
        
        <div id="articleList" class="space-y-3">
          <div class="text-center text-gray-400 py-8">
            暂无数据
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t mt-8 py-4">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
      自动化搜梗+生文工具 © 2026
    </div>
  </footer>

  <!-- 梗内容查看模态框 -->
  <div id="gengContentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full mx-4 max-h-[80vh] flex flex-col">
      <div class="flex justify-between items-center p-4 border-b">
        <h3 class="text-lg font-medium">梗内容</h3>
        <button onclick="closeModal('gengContentModal')" class="text-gray-500 hover:text-gray-700">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-4 overflow-y-auto flex-1">
        <pre id="gengContentText" class="whitespace-pre-wrap text-sm text-gray-700"></pre>
      </div>
    </div>
  </div>

  <!-- 文章内容查看模态框 -->
  <div id="articleContentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full mx-4 max-h-[80vh] flex flex-col">
      <div class="flex justify-between items-center p-4 border-b">
        <h3 class="text-lg font-medium">文章内容</h3>
        <button onclick="closeModal('articleContentModal')" class="text-gray-500 hover:text-gray-700">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-4 overflow-y-auto flex-1">
        <pre id="articleContentText" class="whitespace-pre-wrap text-sm text-gray-700"></pre>
      </div>
    </div>
  </div>

  <script src="/js/components.js"></script>
  <script src="/js/gengActions.js"></script>
  <script src="/js/articleActions.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
