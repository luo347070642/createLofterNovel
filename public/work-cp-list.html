<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品/CP 列表 - 自动化搜梗+生文工具</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">作品/CP 列表</h1>
          <p class="text-gray-500 text-sm mt-1">共 <span id="totalCount">0</span> 条记录</p>
        </div>
        <button
          onclick="window.close()"
          class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors"
        >
          关闭页面
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm p-6">
      <div id="workCpList" class="space-y-3">
        <div class="text-center text-gray-400 py-8">
          加载中...
        </div>
      </div>

      <div id="pagination" class="mt-6 flex items-center justify-center gap-2">
      </div>
    </div>
  </main>

  <script>
    const pageSize = 15;
    let currentPage = 1;
    let allWorkCp = [];

    async function loadWorkCpList() {
      try {
        const response = await fetch('/api/work-cp');
        const data = await response.json();
        
        if (data.success && data.data) {
          allWorkCp = data.data;
          document.getElementById('totalCount').textContent = allWorkCp.length;
          renderList();
        } else {
          document.getElementById('workCpList').innerHTML = `
            <div class="text-center text-gray-400 py-8">
              暂无数据
            </div>
          `;
        }
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('workCpList').innerHTML = `
          <div class="text-center text-red-400 py-8">
            加载失败: ${error.message}
          </div>
        `;
      }
    }

    function renderList() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = allWorkCp.slice(start, end);

      if (pageData.length === 0) {
        document.getElementById('workCpList').innerHTML = `
          <div class="text-center text-gray-400 py-8">
            暂无数据
          </div>
        `;
        return;
      }

      const html = pageData.map(item => `
        <div class="flex items-center justify-between p-4 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors">
          <div class="flex-1">
            <div class="font-medium text-gray-800">${escapeHtml(item.work_name)}</div>
            <div class="text-sm text-gray-500 mt-1">CP: ${escapeHtml(item.cp_name)}</div>
            <div class="text-xs text-gray-400 mt-1">创建时间: ${item.created_at || '未知'}</div>
          </div>
          <button
              data-id="${escapeHtml(item.id)}"
              onclick="deleteWorkCp(this.dataset.id)"
              class="ml-4 px-3 py-1 text-red-500 hover:bg-red-50 rounded transition-colors"
            >
              删除
            </button>
        </div>
      `).join('');

      document.getElementById('workCpList').innerHTML = html;
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(allWorkCp.length / pageSize);
      
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      let html = '';

      html += `<button
        onclick="goToPage(${currentPage - 1})"
        class="px-3 py-2 rounded-lg ${currentPage === 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}"
        ${currentPage === 1 ? 'disabled' : ''}
      >
        上一页
      </button>`;

      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);

      if (start > 1) {
        html += `<button onclick="goToPage(1)" class="px-3 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700">1</button>`;
        if (start > 2) {
          html += `<span class="px-2 text-gray-400">...</span>`;
        }
      }

      for (let i = start; i <= end; i++) {
        html += `<button
          onclick="goToPage(${i})"
          class="px-3 py-2 rounded-lg ${i === currentPage ? 'bg-blue-500 text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}"
        >
          ${i}
        </button>`;
      }

      if (end < totalPages) {
        if (end < totalPages - 1) {
          html += `<span class="px-2 text-gray-400">...</span>`;
        }
        html += `<button onclick="goToPage(${totalPages})" class="px-3 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700">${totalPages}</button>`;
      }

      html += `<button
        onclick="goToPage(${currentPage + 1})"
        class="px-3 py-2 rounded-lg ${currentPage === totalPages ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}"
        ${currentPage === totalPages ? 'disabled' : ''}
      >
        下一页
      </button>`;

      document.getElementById('pagination').innerHTML = html;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(allWorkCp.length / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderList();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteWorkCp(id) {
      showConfirm('确定要删除这条记录吗？', async () => {
        try {
          const response = await fetch(`/api/work-cp/${id}`, {
            method: 'DELETE'
          });
          const data = await response.json();

          if (data.success) {
            alert('删除成功');
            await loadWorkCpList();
          } else {
            alert('删除失败: ' + data.message);
          }
        } catch (error) {
          alert('删除失败: ' + error.message);
        }
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadWorkCpList);
  </script>
</body>
</html>
